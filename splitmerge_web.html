<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitMerge 本地工具</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

    :root {
      --bg-1: #f5f0e8;
      --bg-2: #dfece6;
      --card: #fffaf3;
      --ink: #1f2b2a;
      --muted: #5d6e69;
      --accent: #0f766e;
      --accent-2: #cc5a1c;
      --ok: #146c2e;
      --warn: #b45309;
      --bad: #b42318;
      --line: #d7d1c4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at 10% -10%, #ffe7c2 0%, transparent 60%),
        radial-gradient(900px 400px at 90% 0%, #cdebe3 0%, transparent 55%),
        linear-gradient(165deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding: 28px 14px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: linear-gradient(180deg, #fffdf9 0%, var(--card) 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(20, 40, 35, 0.12);
      overflow: hidden;
      animation: rise 380ms ease-out;
    }

    @keyframes rise {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    header {
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(120deg, rgba(15,118,110,0.08), rgba(204,90,28,0.08));
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.4px;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .tabs {
      display: flex;
      gap: 10px;
      padding: 14px 18px 0;
    }

    .tab {
      border: 1px solid var(--line);
      background: #f9f4eb;
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s ease;
    }

    .tab.active {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(100deg, var(--accent), var(--accent-2));
      transform: translateY(-1px);
    }

    .panel {
      display: none;
      padding: 18px;
      animation: fade .25s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 120px 120px;
      gap: 10px;
      align-items: end;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    label {
      font-size: .9rem;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input[type="number"], input[type="file"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      font-size: .95rem;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: linear-gradient(100deg, var(--accent), #0a5f58);
      color: #fff;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }

    button.secondary {
      background: linear-gradient(100deg, var(--accent-2), #9c4515);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button:not(:disabled):hover { transform: translateY(-1px); }

    .meter {
      margin-top: 12px;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #ece6db;
      border: 1px solid var(--line);
    }

    .meter > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .2s ease;
    }

    .status {
      margin-top: 10px;
      font-size: .9rem;
      color: var(--muted);
      min-height: 1.4em;
    }

    .box {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      max-height: 260px;
      overflow: auto;
    }

    .item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px dashed #e7e0d2;
      padding: 7px 2px;
      font-size: .9rem;
    }

    .item:last-child { border-bottom: 0; }

    .ok { color: var(--ok); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }
    .bad { color: var(--bad); font-weight: 700; }

    .tiny {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .tabs { padding: 12px 12px 0; }
      .panel { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>SplitMerge 本地文件分割与合并</h1>
      <div class="sub">固定 .pkg 后缀，支持 KB / MB，含 SHA-256 完整性检测</div>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="split">分割</button>
      <button class="tab" data-tab="merge">合并</button>
    </div>

    <section id="split" class="panel active">
      <div class="row">
        <div>
          <label>选择源文件</label>
          <input id="splitFile" type="file">
        </div>
      </div>

      <div class="grid">
        <div>
          <label>分割大小</label>
          <input id="chunkValue" type="number" min="1" value="100">
        </div>
        <div>
          <label>单位</label>
          <select id="chunkUnit">
            <option value="KB">KB</option>
            <option value="MB" selected>MB</option>
          </select>
        </div>
        <div>
          <label>后缀</label>
          <input type="text" value=".pkg" readonly>
        </div>
      </div>

      <div class="btns">
        <button id="splitBtn">开始分割</button>
      </div>

      <div class="meter"><i id="splitBar"></i></div>
      <div id="splitStatus" class="status"></div>

      <div class="box" id="splitDownloads"></div>
      <div class="tiny">分割后将生成：所有 .pkg 分块、manifest.json、以及专用 merge-program.html（双击打开即可检测并合并）。</div>
    </section>

    <section id="merge" class="panel">
      <div class="row">
        <div>
          <label>1) 选择 manifest.json</label>
          <input id="manifestFile" type="file" accept="application/json,.json">
        </div>
        <div>
          <label>2) 选择所有 .pkg 分块（可多选）</label>
          <input id="partFiles" type="file" multiple accept=".pkg">
        </div>
      </div>

      <div class="btns">
        <button id="checkBtn" class="secondary">检测完整性</button>
        <button id="mergeBtn" disabled>一键合并并下载</button>
      </div>

      <div class="meter"><i id="mergeBar"></i></div>
      <div id="mergeStatus" class="status"></div>
      <div class="box" id="mergeReport"></div>
    </section>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    const splitFileInput = document.getElementById('splitFile');
    const chunkValueInput = document.getElementById('chunkValue');
    const chunkUnitInput = document.getElementById('chunkUnit');
    const splitBtn = document.getElementById('splitBtn');
    const splitBar = document.getElementById('splitBar');
    const splitStatus = document.getElementById('splitStatus');
    const splitDownloads = document.getElementById('splitDownloads');

    const manifestFileInput = document.getElementById('manifestFile');
    const partFilesInput = document.getElementById('partFiles');
    const checkBtn = document.getElementById('checkBtn');
    const mergeBtn = document.getElementById('mergeBtn');
    const mergeBar = document.getElementById('mergeBar');
    const mergeStatus = document.getElementById('mergeStatus');
    const mergeReport = document.getElementById('mergeReport');

    let lastManifest = null;
    let lastCheckResult = null;

    function formatSize(bytes) {
      if (bytes >= 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
      if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      if (bytes >= 1024) return (bytes / 1024).toFixed(2) + ' KB';
      return bytes + ' B';
    }

    function toHex(buffer) {
      return [...new Uint8Array(buffer)].map(v => v.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    async function sha256FromBlob(blob) {
      const buf = await blob.arrayBuffer();
      const digest = await crypto.subtle.digest('SHA-256', buf);
      return toHex(digest);
    }

    function createDownloadItem(name, blob, label = '下载') {
      const url = URL.createObjectURL(blob);
      const div = document.createElement('div');
      div.className = 'item';

      const left = document.createElement('span');
      left.textContent = name;

      const right = document.createElement('a');
      right.textContent = label;
      right.href = url;
      right.download = name;
      right.className = 'ok';
      right.addEventListener('click', () => {
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }, { once: true });

      div.appendChild(left);
      div.appendChild(right);
      return div;
    }

    function manifestToMergerHtml(manifest) {
      const payload = JSON.stringify(manifest);
      const escaped = payload
        .replace(/\\/g, '\\\\')
        .replace(/`/g, '\\`')
        .replace(/\$/g, '\\$');

      return `<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>merge-program</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;padding:16px;max-width:860px;margin:0 auto;background:#f6f8fa}
    .card{background:#fff;padding:16px;border:1px solid #d0d7de;border-radius:10px}
    .btn{border:0;background:#0969da;color:#fff;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .list{margin-top:12px;border:1px solid #d0d7de;border-radius:8px;max-height:300px;overflow:auto}
    .row{display:flex;justify-content:space-between;padding:8px 10px;border-bottom:1px solid #eaeef2;font-size:14px}
    .row:last-child{border-bottom:0}
    .ok{color:#1a7f37;font-weight:700}.bad{color:#cf222e;font-weight:700}.warn{color:#9a6700;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <h3 style="margin-top:0">一键检测与合并</h3>
    <p>目标文件：<b id="target"></b></p>
    <p>请选择全部 .pkg 分块后点击检测。</p>
    <input id="parts" type="file" multiple accept=".pkg" />
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button id="check" class="btn">检测完整性</button>
      <button id="merge" class="btn" disabled>一键合并并下载</button>
    </div>
    <div id="msg" style="margin-top:10px;color:#57606a"></div>
    <div id="list" class="list"></div>
  </div>
  <script>
    const manifest = JSON.parse(\`${escaped}\`);
    const partsInput = document.getElementById('parts');
    const checkBtn = document.getElementById('check');
    const mergeBtn = document.getElementById('merge');
    const msg = document.getElementById('msg');
    const list = document.getElementById('list');
    document.getElementById('target').textContent = manifest.originalName;

    function hex(buf){return [...new Uint8Array(buf)].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();}
    async function hash(blob){return hex(await crypto.subtle.digest('SHA-256', await blob.arrayBuffer()));}

    let checkResult = null;

    checkBtn.onclick = async () => {
      const files = [...partsInput.files];
      if (!files.length) { msg.textContent = '请先选择分块文件'; return; }
      const map = new Map(files.map(f => [f.name, f]));
      list.innerHTML = '';

      const missing = [];
      const broken = [];
      const ok = [];

      for (const p of manifest.parts) {
        const row = document.createElement('div');
        row.className = 'row';
        const f = map.get(p.name);
        if (!f) {
          missing.push(p.name);
          row.innerHTML = '<span>'+p.name+'</span><span class="bad">缺失</span>';
        } else {
          const h = await hash(f);
          if (h !== p.sha256 || f.size !== p.size) {
            broken.push(p.name);
            row.innerHTML = '<span>'+p.name+'</span><span class="warn">损坏</span>';
          } else {
            ok.push(p.name);
            row.innerHTML = '<span>'+p.name+'</span><span class="ok">完整</span>';
          }
        }
        list.appendChild(row);
      }

      checkResult = { map, missing, broken, ok };
      if (!missing.length && !broken.length) {
        mergeBtn.disabled = false;
        msg.textContent = '检测通过：全部分块完整，可一键合并。';
      } else {
        mergeBtn.disabled = true;
        msg.textContent = '检测未通过：缺失 ' + missing.length + '，损坏 ' + broken.length;
      }
    };

    mergeBtn.onclick = async () => {
      if (!checkResult || checkResult.missing.length || checkResult.broken.length) return;
      const blobs = manifest.parts.map(p => checkResult.map.get(p.name));
      const merged = new Blob(blobs, { type: 'application/octet-stream' });
      const digest = hex(await crypto.subtle.digest('SHA-256', await merged.arrayBuffer()));
      if (digest !== manifest.originalSha256 || merged.size !== manifest.originalSize) {
        msg.textContent = '合并失败：最终校验不通过。';
        mergeBtn.disabled = true;
        return;
      }
      const u = URL.createObjectURL(merged);
      const a = document.createElement('a');
      a.href = u;
      a.download = manifest.originalName;
      a.click();
      URL.revokeObjectURL(u);
      msg.textContent = '合并成功，已开始下载。';
    };
  <\/script>
</body>
</html>`;
    }

    splitBtn.addEventListener('click', async () => {
      const file = splitFileInput.files[0];
      const value = Number(chunkValueInput.value);
      const unit = chunkUnitInput.value;

      if (!file) {
        splitStatus.textContent = '请先选择源文件。';
        return;
      }
      if (!Number.isFinite(value) || value <= 0) {
        splitStatus.textContent = '分割大小必须大于 0。';
        return;
      }

      const chunkBytes = unit === 'KB' ? value * 1024 : value * 1024 * 1024;
      const totalParts = Math.ceil(file.size / chunkBytes);
      const parts = [];

      splitBtn.disabled = true;
      splitBar.style.width = '0%';
      splitDownloads.innerHTML = '';
      splitStatus.textContent = `开始分割：共 ${totalParts} 个分块`;

      try {
        for (let i = 0; i < totalParts; i++) {
          const start = i * chunkBytes;
          const end = Math.min(start + chunkBytes, file.size);
          const blob = file.slice(start, end);
          const name = `part_${String(i + 1).padStart(5, '0')}.pkg`;
          const sha256 = await sha256FromBlob(blob);

          parts.push({ index: i + 1, name, size: blob.size, sha256, blob });
          splitBar.style.width = `${Math.round(((i + 1) / totalParts) * 100)}%`;
          splitStatus.textContent = `分割中：${i + 1}/${totalParts}`;
        }

        const originalSha256 = await sha256FromBlob(file);

        const manifest = {
          version: 1,
          originalName: file.name,
          originalSize: file.size,
          originalSha256,
          chunkValue: value,
          chunkUnit: unit,
          chunkBytes,
          parts: parts.map(({ index, name, size, sha256 }) => ({ index, name, size, sha256 }))
        };

        splitDownloads.appendChild(createDownloadItem('manifest.json', new Blob([JSON.stringify(manifest, null, 2)], { type: 'application/json' })));

        for (const p of parts) {
          splitDownloads.appendChild(createDownloadItem(p.name, p.blob));
        }

        const mergerHtml = manifestToMergerHtml(manifest);
        splitDownloads.appendChild(createDownloadItem('merge-program.html', new Blob([mergerHtml], { type: 'text/html;charset=utf-8' }), '下载专用合并页'));

        splitStatus.textContent = `分割完成：${totalParts} 个 .pkg，源文件 ${formatSize(file.size)}`;
      } catch (err) {
        splitStatus.textContent = `分割失败：${err.message || err}`;
      } finally {
        splitBtn.disabled = false;
      }
    });

    function renderReport(lines) {
      mergeReport.innerHTML = '';
      for (const line of lines) {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<span>${line.name}</span><span class="${line.cls}">${line.text}</span>`;
        mergeReport.appendChild(div);
      }
    }

    async function detectManifestAndParts(manifest, files) {
      const map = new Map(files.map(f => [f.name, f]));
      const missing = [];
      const broken = [];
      const ready = [];
      const lines = [];

      for (let i = 0; i < manifest.parts.length; i++) {
        const part = manifest.parts[i];
        const f = map.get(part.name);

        if (!f) {
          missing.push(part.name);
          lines.push({ name: part.name, text: '缺失', cls: 'bad' });
        } else {
          const hash = await sha256FromBlob(f);
          if (hash !== part.sha256 || f.size !== part.size) {
            broken.push(part.name);
            lines.push({ name: part.name, text: '损坏', cls: 'warn' });
          } else {
            ready.push(part.name);
            lines.push({ name: part.name, text: '完整', cls: 'ok' });
          }
        }

        mergeBar.style.width = `${Math.round(((i + 1) / manifest.parts.length) * 100)}%`;
      }

      return { map, missing, broken, ready, lines };
    }

    checkBtn.addEventListener('click', async () => {
      const manifestFile = manifestFileInput.files[0];
      const files = [...partFilesInput.files];

      mergeBar.style.width = '0%';
      mergeBtn.disabled = true;
      mergeReport.innerHTML = '';

      if (!manifestFile) {
        mergeStatus.textContent = '请先选择 manifest.json。';
        return;
      }
      if (!files.length) {
        mergeStatus.textContent = '请先选择 .pkg 分块文件。';
        return;
      }

      try {
        const text = await manifestFile.text();
        const manifest = JSON.parse(text);
        if (!manifest.parts || !Array.isArray(manifest.parts)) {
          mergeStatus.textContent = 'manifest.json 格式不正确。';
          return;
        }

        mergeStatus.textContent = '检测中，请稍候...';
        const result = await detectManifestAndParts(manifest, files);
        renderReport(result.lines);

        lastManifest = manifest;
        lastCheckResult = result;

        if (!result.missing.length && !result.broken.length) {
          mergeBtn.disabled = false;
          mergeStatus.textContent = `检测通过：${result.ready.length}/${manifest.parts.length} 全部完整`;
        } else {
          mergeStatus.textContent = `检测失败：缺失 ${result.missing.length}，损坏 ${result.broken.length}`;
        }
      } catch (err) {
        mergeStatus.textContent = `检测失败：${err.message || err}`;
      }
    });

    mergeBtn.addEventListener('click', async () => {
      if (!lastManifest || !lastCheckResult) {
        mergeStatus.textContent = '请先执行完整性检测。';
        return;
      }
      if (lastCheckResult.missing.length || lastCheckResult.broken.length) {
        mergeStatus.textContent = '存在缺失或损坏分块，无法合并。';
        return;
      }

      mergeBtn.disabled = true;
      mergeStatus.textContent = '合并中，请稍候...';

      try {
        const blobs = [];
        for (let i = 0; i < lastManifest.parts.length; i++) {
          const p = lastManifest.parts[i];
          blobs.push(lastCheckResult.map.get(p.name));
          mergeBar.style.width = `${Math.round(((i + 1) / lastManifest.parts.length) * 100)}%`;
        }

        const merged = new Blob(blobs, { type: 'application/octet-stream' });
        const finalHash = await sha256FromBlob(merged);

        if (finalHash !== lastManifest.originalSha256 || merged.size !== lastManifest.originalSize) {
          mergeStatus.textContent = '合并完成，但最终校验失败。';
          mergeBtn.disabled = false;
          return;
        }

        const url = URL.createObjectURL(merged);
        const a = document.createElement('a');
        a.href = url;
        a.download = lastManifest.originalName;
        a.click();
        URL.revokeObjectURL(url);

        mergeStatus.textContent = '合并成功并通过校验，已开始下载。';
      } catch (err) {
        mergeStatus.textContent = `合并失败：${err.message || err}`;
        mergeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
